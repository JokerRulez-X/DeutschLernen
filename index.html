<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Deutsch Lernen</title>
    <script type="module" crossorigin src="./assets/index-BmhYAy8d.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-B9CkqoDC.css">
  </head>
  <body>
    <div id="root"></div>
    <!-- 自毁脚本：清除残留的旧版 Service Worker 缓存 -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          for (var i = 0; i < regs.length; i++) {
            regs[i].unregister();
            console.log('[SW] Unregistered old service worker');
          }
        });
        // 也清除所有缓存
        if ('caches' in window) {
          caches.keys().then(function(names) {
            for (var i = 0; i < names.length; i++) {
              caches.delete(names[i]);
              console.log('[SW] Deleted cache:', names[i]);
            }
          });
        }
      }
    </script>
  </body>
</html>
